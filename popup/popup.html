<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Netflix Subtitle Translator</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <img src="icons/icon.svg" alt="" class="logo" />
    <div>
      <h1>Subtitle Translator</h1>
      <span id="statusBadge" class="badge badge-unconfigured">Not configured</span>
    </div>
  </header>

  <section class="toggle-panel">
    <button id="toggleTranslation" class="toggle-btn">Stop Translation</button>
  </section>

  <section class="display-panel">
    <div class="display-label">Subtitle display</div>

    <div class="control-row">
      <span class="control-name">Font size</span>
      <div class="stepper">
        <button class="step-btn" id="fontDown">−</button>
        <span class="step-val" id="fontVal">24px</span>
        <button class="step-btn" id="fontUp">＋</button>
      </div>
    </div>

    <div class="control-row">
      <span class="control-name">Position</span>
      <div class="stepper">
        <button class="step-btn" id="posDown">↓</button>
        <span class="step-val" id="posVal">8%</span>
        <button class="step-btn" id="posUp">↑</button>
      </div>
    </div>

    <div class="control-row">
      <span class="control-name">Window</span>
      <div class="stepper">
        <button class="step-btn" id="winDown">−</button>
        <span class="step-val" id="winVal">5 min</span>
        <button class="step-btn" id="winUp">＋</button>
      </div>
    </div>
  </section>

  <section class="status-panel">
    <div class="status-label">Translation status</div>
    <div id="statusRow" class="status-row state-idle">
      <span id="statusDot" class="status-dot"></span>
      <span id="statusText" class="status-text">Waiting for Netflix…</span>
    </div>
    <div id="statusTime" class="status-time"></div>
  </section>

  <footer>
    <button id="openOptions" class="link-btn">Open full settings</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
